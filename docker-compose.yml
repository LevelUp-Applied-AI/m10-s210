# Stretch Thu — 5-service coordinator stack (graded deliverable).
#
# The 5 microservices are: coordinator, classifier_svc, nlp_svc,
# kg_svc, rag_svc. Healthcheck on every service; coordinator
# depends_on the classifier and the three backends with
# `condition: service_healthy` (bare depends_on lists wait only
# for container start, not ready).
#
# Optional persistence tier: if your kg_svc and rag_svc wire to
# real Neo4j and Weaviate backends, add them here too — the
# resulting topology is 7 services. The graded deliverable is the
# 5-service stack; the persistence tier is optional and reused
# from the Integration when needed.
#
services:
  nlp_svc:
    build:
      context: ./services/nlp_svc
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  kg_svc:
    build:
      context: ./services/kg_svc
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  rag_svc:
    build:
      context: ./services/rag_svc
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  classifier_svc:
    build:
      context: ./services/classifier_svc
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  coordinator:
    build:
      context: ./coordinator
    ports:
      - "8000:8000"
    depends_on:
      classifier_svc:
        condition: service_healthy
      nlp_svc:
        condition: service_healthy
      kg_svc:
        condition: service_healthy
      rag_svc:
        condition: service_healthy
    environment:
      CLASSIFIER_URL: http://classifier_svc:8000/classify
      NLP_SVC_URL: http://nlp_svc:8000/extract
      KG_SVC_URL: http://kg_svc:8000/kg/query
      RAG_SVC_URL: http://rag_svc:8000/rag/answer
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
