services:
  nlp_svc:
    build:
      context: ./services/nlp_svc
    ports:
      - "8002:8000"
    networks:
      - coordinator_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  kg_svc:
    build:
      context: ./services/kg_svc
    ports:
      - "8003:8000"
    networks:
      - coordinator_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  rag_svc:
    build:
      context: ./services/rag_svc
    ports:
      - "8004:8000"
    networks:
      - coordinator_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  classifier_svc:
    build:
      context: ./services/classifier_svc
    ports:
      - "8001:8000"
    networks:
      - coordinator_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  coordinator:
    build:
      context: ./coordinator
    ports:
      - "8000:8000"
    environment:
      CLASSIFIER_URL: http://classifier_svc:8000/classify
      NLP_URL: http://nlp_svc:8000/extract
      KG_URL: http://kg_svc:8000/kg/query
      RAG_URL: http://rag_svc:8000/rag/answer
    depends_on:
      classifier_svc:
        condition: service_healthy
      nlp_svc:
        condition: service_healthy
      kg_svc:
        condition: service_healthy
      rag_svc:
        condition: service_healthy
    networks:
      - coordinator_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

networks:
  coordinator_net:
    name: m10_s210_coordinator_net
